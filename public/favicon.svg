<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 深色圓角底 -->
  <rect width="32" height="32" rx="6" fill="#030714"/>

  <!-- HUD 外框（極淡的青邊框示意） -->
  <rect x="4.5" y="4.5" width="23" height="23" fill="none" stroke="#00ffff" stroke-opacity="0.22" stroke-width="0.75"/>

  <!-- 四角 HUD bracket -->
  <path d="M6 9 V6 H9" fill="none" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>
  <path d="M23 6 H26 V9" fill="none" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>
  <path d="M26 23 V26 H23" fill="none" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>
  <path d="M9 26 H6 V23" fill="none" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>

  <!-- 瞄準圓 -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#00ffff" stroke-width="1.6"/>

  <!-- 瞄準十字（留中間缺口） -->
  <line x1="16" y1="6" x2="16" y2="9.5" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>
  <line x1="16" y1="22.5" x2="16" y2="26" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>
  <line x1="6" y1="16" x2="9.5" y2="16" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>
  <line x1="22.5" y1="16" x2="26" y2="16" stroke="#00ffff" stroke-width="1.4" stroke-linecap="square"/>

  <!-- 中央小點 -->
  <circle cx="16" cy="16" r="1.6" fill="#00ffff"/>
</svg>
